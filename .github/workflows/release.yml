name: Build & publish agent docker image

# Pipeline minimaliste : a chaque tag git v* sur ce repo, build et push
# l'image docker qui WRAP le binaire agent. Le binaire lui-meme N'est
# PAS build ici — il est publie sur releases.beeboop.net depuis le repo
# Draz34/backup-restore (workflow build-agent.yml de ce repo).
#
# Pre-requis avant de tagger ici : le binaire de la version cible doit
# DEJA exister sur releases.beeboop.net/agent/<version>/... sinon le
# Dockerfile (qui pull ce binaire) plante en pre-flight check.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: beeboop-net/agent

jobs:
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="dev-${GITHUB_SHA:0:7}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Pre-flight check binaire SaaS
        # Le Dockerfile pull le binaire depuis releases.beeboop.net pendant
        # le build. Si le binaire n'existe pas, le docker build plante.
        # On verifie en amont pour donner un message d'erreur clair.
        run: |
          URL="https://releases.beeboop.net/agent/${{ steps.version.outputs.version }}/dbtm-agent-linux-amd64.tar.gz"
          if ! curl -fsLI -o /dev/null "$URL"; then
            echo "ERREUR : binaire pas dispo a $URL"
            echo "  -> declenche le workflow build-agent.yml sur Draz34/backup-restore"
            echo "     pour version v${{ steps.version.outputs.version }} avant de retagger ici."
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            AGENT_VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
